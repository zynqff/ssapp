name: Build APK & AAB

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'

      - name: Write google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' \
            > android/app/google-services.json

      - name: Get dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: |
          rm -rf android/app/src/main/res/mipmap-hdpi
          rm -rf android/app/src/main/res/mipmap-mdpi
          rm -rf android/app/src/main/res/mipmap-xhdpi
          rm -rf android/app/src/main/res/mipmap-xxhdpi
          rm -rf android/app/src/main/res/mipmap-xxxhdpi
          dart run flutter_launcher_icons

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d \
            > ${{ github.workspace }}/sscollective-key.jks

      - name: Build APK
        run: |
          flutter build apk --release \
            --no-android-gradle-daemon \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/sscollective-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build AAB
        run: |
          flutter build appbundle --release \
            --no-android-gradle-daemon \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/sscollective-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.workspace }}/build/app/outputs/apk/release/app-release.apk
            ${{ github.workspace }}/build/app/outputs/bundle/release/app-release.aab
          name: SSApp ${{ github.ref_name }}
          body: |
            ### Для установки
            - **app-release.apk** — универсальный, работает на всех устройствах

            ### Для магазинов (AAB)
            - **app-release.aab** — загружать в Рустор / Google Play
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
