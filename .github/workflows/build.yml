name: Build APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'

      - name: Get dependencies
        run: flutter pub get

      - name: Setup Gradle wrapper
        run: |
          curl -L -o android/gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar
          cp android/gradlew . 2>/dev/null || curl -L -o android/gradlew \
            https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradlew
          chmod +x android/gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/sscollective-key.jks

      - name: Build APK
        run: flutter build apk --release --android-skip-build-dependency-validation
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/sscollective-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/android/app/build/outputs/flutter-apk/app-release.apk
          name: SSApp ${{ github.ref_name }}
          body: |
            - Added Russian language (Initial translation. May be rough)
            - Full Russification
            - If you have any corrections or want to help with the translation into Russian and other languages, contact: zynqff@gmail.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
