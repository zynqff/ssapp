name: Add Gradle Wrapper

on:
  workflow_dispatch:  # запускается вручную

jobs:
  add-wrapper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generate gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.11.1

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Commit gradle wrapper files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/gradlew android/gradlew.bat android/gradle/wrapper/
          git commit -m "chore: add gradle wrapper to repo" || echo "No changes to commit"
          git push
