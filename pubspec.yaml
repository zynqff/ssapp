name: ssapp
description: Сборник Стихов
publish_to: none
version: 1.0.5+5

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5        # ← ДОБАВЛЕНО для @riverpod аннотаций
  dio: ^5.4.3
  sqflite: ^2.3.3
  path: ^1.9.0
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^6.0.3
  google_fonts: ^6.2.1
  animations: ^2.0.11
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  google_sign_in: ^6.2.1
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  sqflite_common_ffi: ^2.3.3
  build_runner: ^2.4.0              # ← ДОБАВЛЕНО для запуска генерации
  riverpod_generator: ^2.4.0        # ← ДОБАВЛЕНО для генерации провайдеров

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
